    post:
      tags:
        - Exam
      summary: Új vizsga létrehozása
      description: |
        A `store` action végezzen validálást, majd hozza létre az új vizsgát az adatbázisban, végül adja vissza!

        - Amennyiben a validálás nem sikerül, úgy a hibáról/hibákról tájékoztassa a felhasználót!

        - Amennyiben szükséges bővítse ki a modellt a feladat elvégzéséhez!
      operationId: exams.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamRequest'
            example: { 'type': 'írásbeli', 'name': 'Próbavizsga', 'score': 67.9, 'subject_id': 1 }
      responses:
        '201':
          description: Vizsga létrehozva
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExamResource'
              example:
                {
                  'data':
                    {
                      'id': 999,
                      'type': "\u00edr\u00e1sbeli",
                      'name': "Pr\u00f3bavizsga",
                      'score': 67.9,
                      'subject':
                        {
                          'id': 1,
                          'name': "Programoz\u00e1s alapjai",
                          'credits': 6,
                          'type': "el\u0151ad\u00e1s",
                        },
                    },
                }
        '422':
          description: Érvénytelen adatok
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object
components:
  schemas:
    SubjectResource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 100
        credits:
          type: integer
          min: 0
        type:
          type: string
          maxLength: 50
        exams:
          type: array
          items:
            $ref: '#/components/schemas/ExamResource'
    ExamResource:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 150
        score:
          type: number
          minimum: 0
          maximum: 100
        subject:
          $ref: '#/components/schemas/SubjectResource'
    ExamRequest:
      type: object
      properties:
        type:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 150
        score:
          type: number
          minimum: 0
          maximum: 100
        subject_id:
          type: integer

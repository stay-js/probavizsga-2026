  /api/subjects/{subject}:
    get:
      tags:
        - Subject
      summary: Egy adott tantárgy lekérése
      description: A `show` action jelenítse meg a kiválasztott tantárgy adatait!
      operationId: subjects.show
      parameters:
        - name: subject
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Egy adott tantárgy
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SubjectResource'
              example:
                {
                  'data':
                    {
                      'id': 1,
                      'name': "Programoz\u00e1s alapjai",
